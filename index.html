    // Keep deep copies in runtime memory to track user edits
    let runtimeData = JSON.parse(JSON.stringify(dataset));

    // Handle Font Switching
    function changeFont(fontId) {
      selectedFont = fontId;
      document.querySelectorAll('.font-btn').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('bg-slate-800', 'text-slate-300');
      });
      const activeBtn = document.getElementById(`btn-font-${fontId}`);
      if (activeBtn) {
        activeBtn.classList.remove('bg-slate-800', 'text-slate-300');
        activeBtn.classList.add('bg-blue-600', 'text-white');
      }

      const captureArea = document.getElementById('infobox-capture-area');
      captureArea.className = 'bg-white p-2 rounded-lg shadow-inner overflow-hidden font-' + fontId;
    }

    // Toggle Accordion Rows for Local Elections
    function toggleAccordion(index) {
      if (currentTemplate !== 'local') return;
      runtimeData.local.sections[index].isFolded = !runtimeData.local.sections[index].isFolded;
      render();
    }

    // Colors Modifier
    function updateColors() {
      const col1 = document.getElementById('input-title-bg').value;
      const col2 = document.getElementById('input-sub-bg').value;
      document.getElementById('input-title-bg-text').value = col1;
      document.getElementById('input-sub-bg-text').value = col2;

      runtimeData[currentTemplate].color1 = col1;
      runtimeData[currentTemplate].color2 = col2;
      render();
    }

    function updateColorsText(hexVal, target) {
      if (/^#[0-9A-F]{6}$/i.test(hexVal)) {
        if (target === 'title') {
          document.getElementById('input-title-bg').value = hexVal;
        } else {
          document.getElementById('input-sub-bg').value = hexVal;
        }
        runtimeData[currentTemplate].color1 = document.getElementById('input-title-bg').value;
        runtimeData[currentTemplate].color2 = document.getElementById('input-sub-bg').value;
        render();
      }
    }

    // Image Upload Processor (Transforms selected local files into Base64 smoothly)
    function handleImageUpload(event, targetTemplate, targetField) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          runtimeData[targetTemplate][targetField] = e.target.result;
          render();
          const textInput = document.getElementById(`input-${targetTemplate}-${targetField}`);
          if (textInput) {
            textInput.value = "[로컬 이미지 세팅 완료]";
          }
          showToast("로컬 이미지가 성공적으로 반영되었습니다!");
        };
        reader.readAsDataURL(file);
      }
    }

    // Candidate Photo Image Upload Processor
    function handleCandidateImageUpload(event, targetTemplate, candidateKey) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          runtimeData[targetTemplate][candidateKey].img = e.target.result;
          render();
          const textInput = document.getElementById(`input-${targetTemplate}-${candidateKey}-img`);
          if (textInput) {
            textInput.value = "[로컬 당선인 이미지 세팅 완료]";
          }
          showToast("당선인 인물사진이 반영되었습니다!");
        };
        reader.readAsDataURL(file);
      }
    }

    // Swaps templates
    function selectTemplate(templateId) {
      currentTemplate = templateId;
      
      document.querySelectorAll('.template-tab').forEach(tab => {
        tab.className = "template-tab py-2.5 px-2 rounded-lg text-xs font-bold text-center border transition-all duration-200 bg-slate-800 border-slate-750 text-slate-300 hover:bg-slate-750";

      activeTab.className = "template-tab py-2.5 px-2 rounded-lg text-xs font-bold text-center border transition-all duration-200 bg-blue-600 border-blue-500 text-white shadow-md";

      // Synchronize Design Color Pickers
      document.getElementById('input-title-bg').value = runtimeData[currentTemplate].color1;
      document.getElementById('input-sub-bg').value = runtimeData[currentTemplate].color2;
      document.getElementById('input-title-bg-text').value = runtimeData[currentTemplate].color1;

    // Reusable Video Player Generator (Supports YouTube and direct MP4/WebM video formats)
    function buildVideoEmbedHTML(videoUrl, title, caption) {
      if (!videoUrl) {
        return `
          <div class="relative bg-black h-48 flex items-center justify-center overflow-hidden">
            <img src="https://images.unsplash.com/photo-1540910419892-4a36d2c3266c?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover opacity-65">
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent"></div>
            <div class="absolute bottom-3 left-3 text-left">
              <span class="bg-red-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded mb-1 inline-block">비디오 대기</span>
              <div class="text-white text-[11px] font-bold leading-tight line-clamp-2">${title || '등록된 비디오 정보가 없습니다.'}</div>
            </div>
            <div class="absolute w-12 h-12 bg-red-600/90 rounded-full flex items-center justify-center cursor-pointer">
              <i class="fa-solid fa-play text-white text-lg ml-0.5"></i>
            </div>
          </div>
          <div class="bg-white border-t py-1 text-[11px] text-slate-500 font-semibold text-center">${caption || '동영상 안내'}</div>
        `;
      }

      // 1. YouTube Handler
      if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be') || videoUrl.includes('/embed/')) {
        let embedUrl = videoUrl;
        if (!videoUrl.includes('/embed/')) {
          let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
          let match = videoUrl.match(regExp);
          if (match && match[2].length == 11) {
            embedUrl = `https://www.youtube.com/embed/${match[2]}`;
          }
        }
        return `
          <div class="w-full h-48 bg-black">
            <iframe class="w-full h-full" src="${embedUrl}" title="YouTube Video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <div class="bg-white border-t py-1 text-[11px] text-slate-500 font-semibold text-center">${caption || 'YouTube 실시간 중계방송'}</div>
        `;
      }

      // 2. Direct Video File (.mp4, .webm, etc.)
      if (videoUrl.endsWith('.mp4') || videoUrl.endsWith('.webm') || videoUrl.endsWith('.ogg') || videoUrl.includes('.mp4?') || videoUrl.includes('.webm?')) {
        return `
          <div class="w-full h-48 bg-black">
            <video class="w-full h-full" controls playsinline>
              <source src="${videoUrl}" type="video/mp4">
              사용 중인 브라우저는 동영상 재생을 지원하지 않습니다.
            </video>
          </div>
          <div class="bg-white border-t py-1 text-[11px] text-slate-500 font-semibold text-center">${caption || '재생 가능한 동영상'}</div>
        `;
      }

      // 3. Fallback Link Preview
      return `
        <a href="${videoUrl}" target="_blank" class="block relative bg-black h-48 flex items-center justify-center overflow-hidden hover:opacity-90 transition">
          <img src="https://images.unsplash.com/photo-1540910419892-4a36d2c3266c?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover opacity-65">
          <div class="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent"></div>
          <div class="absolute bottom-3 left-3 text-left">
            <span class="bg-blue-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded mb-1 inline-block">외부 미디어 링크</span>
            <div class="text-white text-[11px] font-bold leading-tight line-clamp-2">${title || '미디어 주소 바로가기'}</div>
          </div>
          <div class="absolute w-12 h-12 bg-slate-700/90 rounded-full flex items-center justify-center">
            <i class="fa-solid fa-up-right-from-square text-white text-base"></i>
          </div>
        </a>
        <div class="bg-white border-t py-1 text-[11px] text-slate-500 font-semibold text-center">${caption || '외부 비디오 플레이어 연결'}</div>
      `;
    }

    // JSON Export - Saves current runtimeData as JSON file
    function exportToJson() {
      try {
        const payload = {
          version: '3.9',
          exportedAt: new Date().toISOString(),
          currentTemplate: currentTemplate,
          selectedFont: selectedFont,
          runtimeData: runtimeData
        };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `선거인포박스_데이터백업_${runtimeData[currentTemplate].title.replace(/ /g, '_')}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        showToast("선거 데이터 백업 파일(JSON)을 정상적으로 다운로드했습니다.");
      } catch (err) {
        showToast("JSON 변환 중 오류가 발생했습니다: " + err.message);
      }
    }

    // JSON Import - Restores runtimeData from a JSON backup file
    function importFromJson(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const parsed = JSON.parse(e.target.result);
          
          if (parsed && parsed.runtimeData) {
            runtimeData = parsed.runtimeData;
            if (parsed.currentTemplate) {
              currentTemplate = parsed.currentTemplate;
            }
            if (parsed.selectedFont) {
              selectedFont = parsed.selectedFont;
              changeFont(selectedFont);
            }
            
            // Re-bootstrap UI with parsed data
            selectTemplate(currentTemplate);
            showToast("선거 백업 파일(JSON) 복원이 성공적으로 완료되었습니다!");
          } else {
            showToast("올바르지 않은 백업 파일 양식입니다. (runtimeData 속성 부재)");
          }
        } catch (err) {
          showToast("JSON 파일 해석에 실패했습니다. 올바른 형식인지 확인하세요.");
        }
        // Reset file input so same file can be selected again
        document.getElementById('json-import-file').value = '';
      };
      reader.readAsText(file);
    }

              <div class="namu-progress-bar flex w-full bg-slate-200 mt-1">
                <div style="width: ${parseFloat(config.proRatio)}%; background-color: #0000ff;"></div>
                <div class="bg-slate-300" style="width: ${100 - parseFloat(config.proRatio) - parseFloat(config.conRatio)}%;"></div>
                <div style="width: ${parseFloat(config.conRatio)}%; background-color: #ff0000;"></div>
              </div>
            </td>
          </tr>
          <!-- 결과 기사 헤더 -->
          <tr>
            <td colspan="5" class="namu-sub-title-bar select-none" style="background-color: ${config.color2};">결과</td>
          </tr>
          <tr>
            <td colspan="5" class="namu-media-placeholder p-0">
              <img src="${config.resultImg}" alt="헌법개정 가결" class="w-full h-40 object-cover">
              <div class="bg-blue-800 text-white font-bold text-center py-1.5 text-xs tracking-wider">${config.resultCaption}</div>
            </td>
          </tr>
        `;
        tbody.insertAdjacentHTML('beforeend', templateRows);

      } else if (currentTemplate === 'assembly') {
        // 이미지 2: 국회의원 총선 전용 렌더링
        let partiesHTML = config.parties.map(p => {
          return `
            <tr>
              <td class="namu-content-cell font-bold text-center flex items-center justify-center py-2">
                <span class="text-white text-[10px] px-1.5 py-0.5 rounded font-black shadow-sm" style="background-color: ${p.color}">${p.name}</span>
              </td>
              <td class="namu-content-cell text-center font-semibold">${p.local}</td>
              <td class="namu-content-cell text-center font-semibold">${p.proportional}</td>
              <td class="namu-content-cell text-center font-black">${p.total}석</td>
              <td class="namu-content-cell text-center text-slate-500 font-mono text-[11px]">${p.ratio}</td>
            </tr>
          `;
        }).join('');

        let templateRows = `
          <tr>
            <td colspan="5" class="namu-media-placeholder p-0">
              ${buildVideoEmbedHTML(config.videoUrl, config.videoTitle, config.videoCaption)}
            </td>
          </tr>
          <!-- 내비게이션 라인 -->
          ${buildNamuNavRowHTML(5)}
          <tr>
            <td class="namu-header-left">투표율</td>
            <td colspan="4" class="namu-content-cell font-semibold">${config.turnout}</td>
          </tr>
          <!-- 선거 결과 대헤더 -->
          <tr>
            <td colspan="5" class="namu-sub-title-bar select-none" style="background-color: ${config.color2};">선거 결과</td>
          </tr>
          <!-- 국회의원 의석 분포 이미지 -->
          <tr>
            <td colspan="5" class="bg-slate-50 p-3 border-b text-center">
              <img src="${config.seatsImg}" alt="국회 의석 분포" class="w-full h-auto object-contain max-h-56 mx-auto rounded border border-slate-200 shadow-sm" onerror="this.outerHTML='<div class=\'py-6 text-slate-400 text-xs font-bold\'>[의석 분포 이미지 로드 실패/미등록]</div>'">
              <div class="text-[10px] text-slate-500 mt-2 font-semibold">제20대 국회 정당별 의석 분포 상황</div>
            </td>
          </tr>
          <!-- 상세 표 헤더 -->
          <tr class="bg-slate-100 font-bold text-center text-slate-700 text-[11px]">
            <td style="width: 25%">정당</td>
            <td style="width: 18%">지역구</td>
            <td style="width: 18%">비례대표</td>
            <td style="width: 20%">총합</td>
            <td style="width: 19%">비율</td>
          </tr>
          ${partiesHTML}
        `;
        tbody.insertAdjacentHTML('beforeend', templateRows);

      } else if (currentTemplate === 'local') {
        // 이미지 3: 전국동시지방선거 전용 렌더링
        let sectionRows = config.sections.map((sec, secIdx) => {
          let sectionBodyHTML = sec.data.map(item => {
            return `
              <div class="grid grid-cols-12 gap-1 items-center bg-white p-2 border-b border-slate-200 hover:bg-slate-50 text-xs">
                <div class="col-span-4 font-bold text-slate-800 flex items-center justify-start pl-2">
                  <span class="text-white text-[10px] px-1.5 py-0.5 rounded font-black shadow-sm" style="background-color: ${item.color}">${item.party}</span>
                </div>
                <!-- 점유율 시각화 바 -->
                <div class="col-span-4 px-1">
                  <div class="w-full bg-slate-100 rounded-sm h-3 overflow-hidden border border-slate-200">
                    <div class="h-full rounded-sm" style="width: ${parseFloat(item.ratio)}%; background-color: ${item.color}"></div>
                  </div>
                </div>
                <div class="col-span-2 text-center font-bold text-slate-700">${item.count}</div>
                <div class="col-span-2 text-right font-bold text-pink-600 text-[10px]">${item.ratio}</div>
              </div>
            `;
          }).join('');

          // Accordion wrapper
          return `
            <!-- 섹션 헤더 -->
            <tr>
              <td colspan="5" class="p-0 border-none">
                <div onclick="toggleAccordion(${secIdx})" class="bg-pink-100 hover:bg-pink-200 py-1.5 px-3 flex justify-between items-center cursor-pointer transition select-none border border-pink-200 border-b-0">
                  <span class="text-xs font-black text-pink-700">${sec.title}</span>
                  <span class="text-[10px] text-pink-600 bg-white border border-pink-300 px-1.5 py-0.5 rounded font-bold shadow-sm">
                    ${sec.isFolded ? '[ 펼치기 ]' : '[ 접기 ]'}
                  </span>
                </div>
                <div class="accordion-body ${sec.isFolded ? 'collapsed' : ''} bg-slate-50 border border-slate-300 border-t-0">
                  <div class="grid grid-cols-12 bg-slate-100 p-2 border-b border-slate-200 text-[10.5px] font-bold text-slate-500 text-center">
                    <div class="col-span-4 text-left pl-3">정당</div>
                    <div class="col-span-4">점유율 시각화</div>
                    <div class="col-span-2">당선인 수</div>
                    <div class="col-span-2 text-right pr-2">비율</div>
                  </div>
                  ${sectionBodyHTML}
                </div>
              </td>
            </tr>
          `;
        }).join('');

        let templateRows = `
          <tr>
            <td colspan="5" class="namu-media-placeholder p-0">
              ${buildVideoEmbedHTML(config.videoUrl, config.videoTitle, config.videoCaption)}
            </td>
          </tr>
          ${buildNamuNavRowHTML(5)}
          <tr>
            <td class="namu-header-left">투표율</td>
            <td colspan="4" class="namu-content-cell font-semibold">${config.turnout}</td>
          </tr>
          ${sectionRows}
        `;
        tbody.insertAdjacentHTML('beforeend', templateRows);

      } else if (currentTemplate === 'by-election') {
        // 이미지 4: 재보궐선거 전용 렌더링 (0석 필터에 반응해 유동적으로 폭 조절)
        let byRows = config.tableData.map(row => {
          let colsHTML = activeColumns.map(col => {
            const val = (row[col.id] || '').trim();
            return `<td class="namu-content-cell text-center font-bold text-slate-700">${val}</td>`;
          }).join('');

          return `
            <tr>
              <td class="namu-content-cell font-bold text-center flex items-center justify-center py-2">
                <span class="text-white text-[10px] px-1.5 py-0.5 rounded font-black shadow-sm" style="background-color: ${row.color}">${row.party}</span>
              </td>
              ${colsHTML}
            </tr>
          `;
        }).join('');

        let eduRows = config.eduData.map(row => {
          return `
            <tr>
              <td class="namu-content-cell font-bold text-center flex items-center justify-center py-1.5">
                <span class="text-white text-[10px] px-1.5 py-0.5 rounded font-black shadow-sm" style="background-color: ${row.color}">${row.type}</span>
              </td>
              <td colspan="${activeColumns.length}" class="namu-content-cell text-center font-bold text-slate-700">${row.seats}</td>
            </tr>
          `;
        }).join('');

        let headerColsHTML = activeColumns.map(col => {
          return `<td style="width: ${80 / activeColumns.length}%">${col.label}</td>`;
        }).join('');

        let templateRows = `
          <tr>
            <td colspan="${colspanVal}" class="namu-media-placeholder p-0">
              ${buildVideoEmbedHTML(config.videoUrl, '재보궐 선거 개표 현황', config.videoCaption)}
            </td>
          </tr>
          <!-- 재보선용 5칸 내비게이션 바 -->
          ${buildNamuNavRowHTML(colspanVal)}
          <tr>
            <td class="namu-header-left">투표율</td>
            <td colspan="${colspanVal - 1}" class="namu-content-cell font-semibold">${config.turnout}</td>
          </tr>
          <!-- 결과 헤더 -->
          <tr>
            <td colspan="${colspanVal}" class="namu-sub-title-bar select-none" style="background-color: ${config.color2};">선거 결과</td>
          </tr>
          <tr class="bg-slate-100 font-bold text-center text-teal-800 text-[10px]">
            <td style="width: 20%">정당</td>
            ${headerColsHTML}
          </tr>
          ${byRows}
          <tr class="bg-slate-100 font-bold text-center text-teal-850 text-[10.5px]">
            <td>성향</td>
            <td colspan="${activeColumns.length}">교육감</td>
          </tr>
          ${eduRows}
        `;
        tbody.insertAdjacentHTML('beforeend', templateRows);

      } else if (currentTemplate === 'presidential') {
        // 이미지 5: 대통령선거 전용 렌더링
        let templateRows = `
          <!-- 선거 벽보 영역 -->
          <tr>
            <td colspan="5" class="namu-media-placeholder p-0">
              <img src="${config.posterImg}" alt="선거 벽보" class="w-full h-auto object-cover max-h-56" onerror="this.outerHTML='<div class=\'py-12 bg-slate-50 text-slate-400 text-xs font-bold\'>[선거 벽보 이미지 설정 필요]</div>'">
              <div class="bg-white border-t py-1 text-[11px] text-slate-500 font-semibold text-center">후보자들의 선거 벽보</div>
            </td>
          </tr>
          <!-- 대통령선거 전용 5칸 내비게이션 바 -->
          ${buildNamuNavRowHTML(5)}
          <tr>
            <td class="namu-header-left">투표율</td>
            <td colspan="4" class="namu-content-cell font-semibold">${config.turnout}</td>
          </tr>
          <!-- 선거 결과 헤더 -->
          <tr>
            <td colspan="5" class="namu-sub-title-bar select-none" style="background-color: ${config.color2};">선거 결과</td>
          </tr>
          <!-- 후보명 및 대비 바그래프 -->
          <tr class="bg-slate-50 font-bold text-xs text-center">
            <td class="p-2 border-r" colspan="1" style="width:25%">후보</td>
            <td class="p-2 border-r" colspan="2" style="width:37.5%; color: ${config.candidate1.color};">
              <span class="bg-blue-800 text-white text-[10px] px-1.5 py-0.5 rounded font-black mr-1">${config.candidate1.party}</span><br>
              <span class="text-base font-black">${config.candidate1.name}</span>
            </td>
            <td class="p-2" colspan="2" style="width:37.5%; color: ${config.candidate2.color};">
              <span class="bg-red-600 text-white text-[10px] px-1.5 py-0.5 rounded font-black mr-1">${config.candidate2.party}</span><br>
              <span class="text-base font-black">${config.candidate2.name}</span>
            </td>
          </tr>
          <!-- 득표율 그래프 슬라이더 -->
          <tr>
            <td class="namu-header-left">득표율</td>
            <td colspan="4" class="p-2 bg-white">
              <div class="flex justify-between items-center text-xs font-black text-slate-800 mb-1 px-1">
                <span>${config.candidate1.ratio}</span>
                <span>${config.candidate2.ratio}</span>
              </div>
              <div class="namu-progress-bar flex w-full bg-slate-200 rounded overflow-hidden">
                <div style="width: ${parseFloat(config.candidate1.ratio)}%; background-color: ${config.candidate1.color};"></div>
                <div class="bg-slate-300" style="width: ${100 - parseFloat(config.candidate1.ratio) - parseFloat(config.candidate2.ratio)}%;"></div>
                <div style="width: ${parseFloat(config.candidate2.ratio)}%; background-color: ${config.candidate2.color};"></div>
              </div>
            </td>
          </tr>
          <!-- 득표수 -->
          <tr>
            <td class="namu-header-left">득표수</td>
            <td class="namu-content-cell text-center font-bold text-slate-700" colspan="2">${config.candidate1.votes}</td>
            <td class="namu-content-cell text-center font-bold text-slate-700" colspan="2">${config.candidate2.votes}</td>
          </tr>
          <!-- 당선인 헤더 -->
          <tr>
            <td colspan="5" class="namu-sub-title-bar select-none" style="background-color: ${config.color2};">대통령 당선인</td>
          </tr>
          <!-- 당선인 증명 대형 카드 -->
          <tr>
            <td colspan="5" class="p-0.5 bg-slate-50 text-center">
              <img src="${config.candidate1.img}" alt="대통령 당선인" class="w-full h-80 object-cover border-b" onerror="this.outerHTML='<div class=\'py-12 text-slate-400 text-xs font-bold\'>[인물 사진 없음]</div>'">
              <div class="text-white py-2.5" style="background-color: ${config.candidate1.color}">
                <div class="text-[11px] font-black opacity-90">${config.candidate1.party}</div>
                <div class="text-lg font-black tracking-widest mt-0.5">${config.candidate1.name}</div>
              </div>
            </td>
          </tr>
        `;
        tbody.insertAdjacentHTML('beforeend', templateRows);
      }
    }

    // Export Table container to crisp high-res PNG image
    function exportToImage() {
      const container = document.getElementById('infobox-capture-area');
      html2canvas(container, {
        backgroundColor: '#ffffff',
        scale: 2,
        useCORS: true,
        logging: false
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `${runtimeData[currentTemplate].title}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('성공적으로 선거 인포박스 이미지가 저장되었습니다.');
      }).catch(err => {
        showToast('이미지 처리 중 오류 발생: ' + err.message);
      });
    }

    // Generates perfect Namuwiki native table markdown syntax to copy
    function copyWikiSyntax() {
      const config = runtimeData[currentTemplate];
      let code = `||<tablewidth=420><tablebordercolor=${config.color1}><tablealign=right> {{{\#fff '''${config.title}'''}}} [[분류:선거 인포박스]] ||\n`;
      code += `||<colspan=3><bgcolor=${config.color2}> {{{\#fff '''${config.subtitle}'''}}} ||\n`;
      
      if (currentTemplate === 'national') {
        code += `||<bgcolor=#f2f2f2><width=110> '''사유''' ||<colspan=2> ${config.reason} ||\n`;
        code += `||<bgcolor=#f2f2f2> '''투표율''' ||<colspan=2> ${config.turnout} ||\n`;
        code += `||<colspan=3><bgcolor=${config.color2}> '''개표''' ||\n`;
        code += `|| 찬성: ${config.proRatio} ||<colspan=2> 반대: ${config.conRatio} ||\n`;
        code += `||<colspan=3><bgcolor=${config.color2}> '''결과''' ||\n`;
        code += `||<colspan=3><bgcolor=#0000ff> {{{\#fff '''${config.resultCaption}'''}}} ||\n`;
      } else {
        config.fields.forEach(f => {
          code += `||<bgcolor=#f2f2f2><width=110> '''${f.label}''' ||<colspan=2> ${f.val} ||\n`;
        });
      }
      
      code += `||<width=33%><bgcolor=#ffffff> [[${config.prev}]] ||<width=34%><bgcolor=#ffffff> [[${config.center}]] ||<width=33%><bgcolor=#ffffff> [[${config.next}]] ||\n`;
      
      const textarea = document.createElement('textarea');
      textarea.value = code;
      textarea.style.position = 'fixed';
      document.body.appendChild(textarea);
      textarea.select();
      
      try {
        document.execCommand('copy');
        showToast('나무위키 위키 표 문법이 클립보드에 복사되었습니다.');
      } catch (err) {
        showToast('복사 실패. 우측 영역을 드래그해 수동 복사하세요.');
      }
      
      document.body.removeChild(textarea);
    }

    // UI Toast Messages
    function showToast(msg) {
      const toast = document.getElementById('toast-message');
      const text = document.getElementById('toast-text');
      text.innerText = msg;
      
      toast.classList.remove('opacity-0', 'translate-y-20', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');
      
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-20', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 3000);
    }

    // Reset Factory Presets
    function resetToDefaultData() {
      if (confirm('모든 커스텀 선거 데이터를 나무위키 원본으로 복구하시겠습니까?')) {
        runtimeData = JSON.parse(JSON.stringify(dataset));
        selectTemplate(currentTemplate);
        showToast('원본 데이터로 동기화 완료되었습니다.');
      }
    }

    // App Initialization Bootstrapper
    window.onload = function() {
      selectTemplate('national');
      changeFont('default');
    };
  </script>
</body>
</html>
